name: VSCode Extension - Build and Package

on:
  push:
    branches:
      - '**'  # Run on all branches
    paths:
      - 'src/**'
      - 'packages/model-metadata/**'
      - 'scripts/**'
      - 'assets/**'
      - 'esbuild.js'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.vscodeignore'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/build-test-package.yml'
  pull_request:
    branches:
      - '**'
    paths:
      - 'src/**'
      - 'packages/model-metadata/**'
      - 'scripts/**'
      - 'assets/**'
      - 'esbuild.js'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - '.vscodeignore'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
      - '.github/workflows/build-test-package.yml'

jobs:
  build-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Package extension
        run: pnpm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-extension
          path: '*.vsix'
          retention-days: 30
